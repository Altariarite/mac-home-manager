theme = "modus_operandi"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
true-color = true
rulers = [80]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[keys.normal]
"Cmd-/" = "toggle_comments"
"Cmd-s" = ":write"
"Cmd-S" = ":reload-all"

[keys.insert]
"Cmd-s" = ":write"

[keys.select]
"Cmd-/" = "toggle_comments"
"Cmd-s" = ":write"


